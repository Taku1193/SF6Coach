AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SF6 Coach MVP stack

Globals:
  Function:
    # すべての Lambda に共通する実行条件をここで揃える。
    Runtime: nodejs22.x
    Timeout: 30
    MemorySize: 512
    Architectures:
      - x86_64
    Environment:
      Variables:
        NOTES_TABLE_NAME: !Ref NotesTable
        OPENAI_API_KEY: !Ref OpenAiApiKey
        OPENAI_MODEL: !Ref OpenAiModel

Parameters:
  OpenAiApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API key used by the consultation Lambda.
  OpenAiModel:
    Type: String
    Default: gpt-4.1-mini
    Description: OpenAI model name used for AI consultation.
  FrontendOrigin:
    Type: String
    Default: "*"
    Description: Allowed browser origin for API CORS. Use * for MVP or set your CloudFront URL later.
  FrontendCustomDomain:
    Type: String
    Default: ""
    Description: Optional custom domain for the frontend distribution, for example sf6coach.graycier.com.
  FrontendCertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN in us-east-1 used by CloudFront when FrontendCustomDomain is enabled.
  Route53HostedZoneId:
    Type: String
    Default: ""
    Description: Public Route53 hosted zone id that owns FrontendCustomDomain.

Conditions:
  # 独自ドメイン運用では、CloudFront 側の CNAME、証明書、Route53 レコードをまとめて有効化する。
  UseFrontendCustomDomain: !And
    - !Not [!Equals [!Ref FrontendCustomDomain, ""]]
    - !Not [!Equals [!Ref FrontendCertificateArn, ""]]
    - !Not [!Equals [!Ref Route53HostedZoneId, ""]]

Resources:
  Sf6CoachApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      # MVP では単一フロントエンドから叩く前提だが、開発中の確認もしやすいよう CORS をパラメータ化している。
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontendOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PATCH
          - PUT
          - DELETE
          - OPTIONS
      Auth:
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${Sf6CoachUserPool}"
              audience:
                - !Ref Sf6CoachUserPoolClient
        DefaultAuthorizer: CognitoJwtAuthorizer

  Sf6CoachUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      # メールアドレス + パスワード認証を前提に、メール確認込みの User Pool を定義する。
      UserPoolName: !Sub "${AWS::StackName}-users"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  Sf6CoachUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      # フロントエンドから直接認証 API を叩けるよう、クライアントシークレットなしで構成する。
      ClientName: !Sub "${AWS::StackName}-web-client"
      UserPoolId: !Ref Sf6CoachUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 30
      SupportedIdentityProviders:
        - COGNITO

  NotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      # ノート本体は userId + noteId の複合キーで持ち、キャラ別一覧は GSI1 で引く。
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: noteId
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: noteId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      # フロント配信は CloudFront 経由に限定したいため、S3 自体は非公開のまま運用する。
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-frontend-oac"
        Description: Access control for SF6 Coach frontend bucket
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        # SPA をそのまま配信する構成。S3 をオリジンにして CloudFront で HTTPS 配信する。
        Enabled: true
        Comment: !Sub "${AWS::StackName} frontend distribution"
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Aliases: !If
          - UseFrontendCustomDomain
          - - !Ref FrontendCustomDomain
          - !Ref AWS::NoValue
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt FrontendOriginAccessControl.Id
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          # BrowserRouter を使っているため、深い URL でも index.html にフォールバックする。
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate: !If
          - UseFrontendCustomDomain
          - # CloudFront の独自ドメインでは us-east-1 の ACM 証明書が必須になる。
            AcmCertificateArn: !Ref FrontendCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

  FrontendAliasRecordA:
    Type: AWS::Route53::RecordSet
    Condition: UseFrontendCustomDomain
    Properties:
      # ルートの hosted zone 内に、CloudFront へ向く Alias A レコードを作成する。
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !Ref FrontendCustomDomain
      Type: A
      AliasTarget:
        DNSName: !GetAtt FrontendDistribution.DomainName
        # CloudFront Distribution 向け Alias で使う固定 hosted zone id。
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  FrontendAliasRecordAaaa:
    Type: AWS::Route53::RecordSet
    Condition: UseFrontendCustomDomain
    Properties:
      # IPv6 経由でも同じ CloudFront へ解決できるよう AAAA Alias も張る。
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !Ref FrontendCustomDomain
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt FrontendDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action:
              - s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  Sf6CoachApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      # Lambda は事前に CommonJS バンドルした成果物だけを配布し、デプロイ経路を単純化する。
      CodeUri: artifacts/lambda
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NotesTable
      Events:
        ListNotes:
          Type: HttpApi
          Properties:
            ApiId: !Ref Sf6CoachApi
            Method: GET
            Path: /notes
        GetNote:
          Type: HttpApi
          Properties:
            ApiId: !Ref Sf6CoachApi
            Method: GET
            Path: /notes/{noteId}
        CreateBattleRecord:
          Type: HttpApi
          Properties:
            ApiId: !Ref Sf6CoachApi
            Method: POST
            Path: /notes/battle-record
        CreateVideoSummary:
          Type: HttpApi
          Properties:
            ApiId: !Ref Sf6CoachApi
            Method: POST
            Path: /notes/video-summary
        CreateGeneralNote:
          Type: HttpApi
          Properties:
            ApiId: !Ref Sf6CoachApi
            Method: POST
            Path: /notes/general
        UpdateNote:
          Type: HttpApi
          Properties:
            ApiId: !Ref Sf6CoachApi
            Method: PUT
            Path: /notes/{noteId}
        UpdateFavorite:
          Type: HttpApi
          Properties:
            ApiId: !Ref Sf6CoachApi
            Method: PATCH
            Path: /notes/{noteId}/favorite
        DeleteNote:
          Type: HttpApi
          Properties:
            ApiId: !Ref Sf6CoachApi
            Method: DELETE
            Path: /notes/{noteId}
        AiConsultation:
          Type: HttpApi
          Properties:
            ApiId: !Ref Sf6CoachApi
            Method: POST
            Path: /ai-consultation
        GetFocusIssue:
          Type: HttpApi
          Properties:
            ApiId: !Ref Sf6CoachApi
            Method: GET
            Path: /focus-issue
        SaveFocusIssue:
          Type: HttpApi
          Properties:
            ApiId: !Ref Sf6CoachApi
            Method: PUT
            Path: /focus-issue
Outputs:
  # デプロイ後にフロント・API・DynamoDB の参照先をすぐ確認できるよう、主要値を出力する。
  ApiUrl:
    Description: HTTP API base URL
    Value: !Sub "https://${Sf6CoachApi}.execute-api.${AWS::Region}.amazonaws.com"
  NotesTableName:
    Description: DynamoDB notes table name
    Value: !Ref NotesTable
  LambdaFunctionName:
    Description: Notes API Lambda function name
    Value: !Ref Sf6CoachApiFunction
  FrontendBucketName:
    Description: Private S3 bucket for frontend assets
    Value: !Ref FrontendBucket
  FrontendDistributionId:
    Description: CloudFront distribution id
    Value: !Ref FrontendDistribution
  FrontendDomainName:
    Description: CloudFront domain name for the frontend
    Value: !GetAtt FrontendDistribution.DomainName
  FrontendCustomUrl:
    Condition: UseFrontendCustomDomain
    Description: Custom frontend URL when Route53 and ACM are configured.
    Value: !Sub "https://${FrontendCustomDomain}"
  CognitoUserPoolId:
    Description: Cognito User Pool id for frontend auth configuration
    Value: !Ref Sf6CoachUserPool
  CognitoUserPoolClientId:
    Description: Cognito User Pool client id for frontend auth configuration
    Value: !Ref Sf6CoachUserPoolClient
  CognitoRegion:
    Description: AWS region used by Cognito authentication
    Value: !Ref AWS::Region
